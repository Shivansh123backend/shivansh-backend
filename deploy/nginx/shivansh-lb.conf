# SHIVANSH NGINX load balancer
# Generated upstream block lives in /etc/nginx/conf.d/shivansh-upstream.conf
# (managed by deploy/lb/health-monitor.sh — DO NOT edit by hand).
#
# Install:
#   sudo cp deploy/nginx/shivansh-lb.conf /etc/nginx/sites-available/shivansh-lb
#   sudo ln -sf /etc/nginx/sites-available/shivansh-lb /etc/nginx/sites-enabled/shivansh-lb
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# WebSocket upgrade map — required for Socket.IO and Telnyx Media Streaming.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream pool is defined in this include file. The health monitor rewrites
# it (with `down` markers for unhealthy nodes) and runs `nginx -t` before
# reloading. If the rewrite fails validation the previous file is restored,
# so the LB never goes dark.
include /etc/nginx/conf.d/shivansh-upstream.conf;

server {
    listen 80;
    listen [::]:80;
    server_name api.shivanshagent.cloudisoft.com;

    # ACME http-01 challenge (Let's Encrypt renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.shivanshagent.cloudisoft.com;

    ssl_certificate     /etc/letsencrypt/live/api.shivanshagent.cloudisoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.shivanshagent.cloudisoft.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Generous limits — call audio + lead CSV uploads
    client_max_body_size 50m;
    proxy_read_timeout   3600s;
    proxy_send_timeout   3600s;
    proxy_connect_timeout 10s;

    # Real-IP forwarding (the upstream sees the caller, not nginx)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket / Socket.IO / Telnyx Media Streaming — sticky to a single upstream
    # for the lifetime of the connection (ip_hash in the upstream block handles
    # this; once an upstream is chosen the connection stays put).
    location /api/ws {
        proxy_pass         http://shivansh_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    location /socket.io/ {
        proxy_pass         http://shivansh_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    # Telnyx Media Streaming over WSS (audio frames)
    location /media-stream {
        proxy_pass         http://shivansh_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    # Health endpoint — let the LB itself answer instantly without hitting upstream
    location = /lb/health {
        access_log off;
        return 200 "lb-ok\n";
        add_header Content-Type text/plain;
    }

    # All other API + dashboard traffic — round-robin across the pool
    location / {
        proxy_pass http://shivansh_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Retry the next upstream if the chosen one fails mid-request
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
}
